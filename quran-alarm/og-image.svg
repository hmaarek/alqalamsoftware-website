<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg1" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#0f2a10"/>
      <stop offset="100%" stop-color="#080d08"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="160" height="160" rx="36" ry="36"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg1)"/>
  <ellipse cx="900" cy="315" rx="400" ry="350" fill="url(#glow)"/>

  <!-- Left side: text content -->
  <!-- Arabic headline -->
  <text x="100" y="220" font-family="'Geeza Pro', 'Arabic Typesetting', 'SF Arabic', sans-serif"
        font-size="72" font-weight="bold" fill="#ffffff" text-anchor="start"
        direction="rtl" unicode-bidi="bidi-override">
    استيقظ على القرآن الكريم
  </text>

  <!-- Green accent line -->
  <rect x="100" y="248" width="120" height="4" rx="2" fill="#22c55e"/>

  <!-- English subtitle -->
  <text x="100" y="310" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', sans-serif"
        font-size="32" fill="#888888" text-anchor="start">
    Wake up to the Quran, not a jarring alarm
  </text>

  <!-- Feature pills -->
  <rect x="100" y="370" width="190" height="44" rx="22" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="195" y="398" font-family="'Geeza Pro', 'SF Arabic', sans-serif" font-size="20" fill="#22c55e" text-anchor="middle">أوقات الصلاة</text>

  <rect x="308" y="370" width="160" height="44" rx="22" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="388" y="398" font-family="'Geeza Pro', 'SF Arabic', sans-serif" font-size="20" fill="#22c55e" text-anchor="middle">قراء عالميون</text>

  <rect x="486" y="370" width="190" height="44" rx="22" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="581" y="398" font-family="'Geeza Pro', 'SF Arabic', sans-serif" font-size="20" fill="#22c55e" text-anchor="middle">آيات يومية جديدة</text>

  <!-- App Store badge area -->
  <rect x="100" y="490" width="260" height="64" rx="16" fill="#22c55e"/>
  <text x="210" y="531" font-family="-apple-system, 'SF Pro Display', sans-serif"
        font-size="24" font-weight="bold" fill="#000000" text-anchor="middle">Download on App Store</text>

  <!-- Right side: app icon -->
  <g transform="translate(890, 155)">
    <rect x="-10" y="-10" width="180" height="180" rx="42" fill="rgba(34,197,94,0.15)"/>
    <image href="icon.png" x="0" y="0" width="160" height="160" clip-path="url(#iconClip)"/>
  </g>

  <!-- Domain watermark -->
  <text x="1100" y="600" font-family="-apple-system, sans-serif" font-size="20"
        fill="#333333" text-anchor="end">alqalamsoftware.com</text>
</svg>
